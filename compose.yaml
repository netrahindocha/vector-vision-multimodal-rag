services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag_app
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma-data:/chroma/chroma

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: rag-backend
    ports:
      - "8000:8000"
    depends_on:
      - chroma
      - postgres
      - redis
    env_file:
      ./server/.env
    environment:
      DATABASE_URL: postgresql+psycopg://rag_user:rag_password@postgres:5432/rag_app
      PYTHONUNBUFFERED: "1"
      DO_NOT_TRACK: "true"
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION_NAME: rag_documents
      UPLOAD_DIR: /workspace/uploads
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - upload-data:/workspace/uploads
      - unstructured-cache:/home/notebook-user/.cache

  celery_worker:
    image: rag-backend
    build:
      context: ./server
      dockerfile: Dockerfile
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=1
    depends_on:
      - chroma
      - postgres
      - redis
    env_file:
      ./server/.env
    environment:
      DATABASE_URL: postgresql+psycopg://rag_user:rag_password@postgres:5432/rag_app
      PYTHONUNBUFFERED: "1"
      DO_NOT_TRACK: "true"
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION_NAME: rag_documents
      UPLOAD_DIR: /workspace/uploads
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - upload-data:/workspace/uploads
      - unstructured-cache:/home/notebook-user/.cache

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: rag-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  chroma-data:
  upload-data:
  unstructured-cache:
  redis-data:
